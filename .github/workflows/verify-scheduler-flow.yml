name: Verify Scheduler Flow

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Flow CLI
        run: |
          brew update
          brew install flow-cli

      - name: Start Flow emulator
        run: |
          nohup flow emulator start --block-time 1s --admin-port 8081 --debugger-port 2346 > /tmp/flow-emulator.log 2>&1 &
          sleep 5

      - name: Deploy contracts to emulator
        run: flow project deploy --network emulator

      - name: Run sequential scheduler verification
        run: ./scripts/verify_scheduler_flow.sh
